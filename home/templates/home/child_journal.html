<div class="table-responsive">
    <table class="table table-hover align-middle" style="font-size: 0.925rem;">
        <thead class="table-light text-secondary">
            <tr>
                <th style="width: 15%;">Дата урока</th>
                <th style="width: 35%;">Тема занятия</th>
                <th style="width: 20%; text-align: center;">Посещаемость</th>
                <th style="width: 30%;">Комментарий учителя</th>
            </tr>
        </thead>
        <tbody>
            {% for entry in item.journal_entries %}
            <tr>
                <td class="fw-bold text-secondary">{{ entry.schedule.date|date:"d.m.Y" }}</td>
                <td class="text-dark">{{ entry.schedule.topic|default:"—" }}</td>
                <td class="text-center">
                    {% if entry.attendance %}
                        <span class="badge bg-success-subtle text-success px-2.5 py-1 rounded-pill small fw-bold" style="background-color: #d1fae5; color: #065f46;">Присутствовал</span>
                    {% else %}
                        <span class="badge bg-danger-subtle text-danger px-2.5 py-1 rounded-pill small fw-bold" style="background-color: #fee2e2; color: #991b1b;">Отсутствовал</span>
                    {% endif %}
                </td>
                <td class="text-muted small">{{ entry.comment|default:"—" }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
