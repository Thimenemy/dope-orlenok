<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Панель преподавателя{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; }
        main { flex: 1; }
        .sidebar { background-color: #f8f9fa; box-shadow: inset -1px 0 0 rgba(0,0,0,.1); }
        .sidebar .nav-link { font-weight: 500; color: #333; }
        .sidebar .nav-link:hover { color: #0d6efd; }
        .sidebar .nav-link.active { color: #0d6efd; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <nav class="navbar navbar-dark bg-dark shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand" href="{% url 'teacher:group_list' %}">
                    <i class="fas fa-chalkboard-teacher"></i> Преподаватель
                </a>
                <div class="d-flex">
                    <span class="navbar-text me-3">{{ user.get_full_name|default:user.username }}</span>
                    <form action="{% url 'accounts:logout' %}" method="post">
                        {% csrf_token %}
                        <button class="btn btn-outline-light btn-sm" type="submit">Выйти</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <div class="container-fluid">
        <div class="row">
            <!-- Боковое меню -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link {% if request.resolver_match.url_name == 'group_list' %}active{% endif %}" href="{% url 'teacher:group_list' %}">
                                <i class="fas fa-users"></i> Группы
                            </a>
                        </li>
                        
                        
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'chat:chat_list' %}">
                                <i class="fas fa-comments"></i> Чаты
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Основной контент -->
            <main class="col-md-9 col-lg-10 ms-sm-auto px-md-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <footer class="text-center text-muted py-3 mt-4 border-top">
        &copy; {{ now|date:"Y" }} Образовательный центр
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
