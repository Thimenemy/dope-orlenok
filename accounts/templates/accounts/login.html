{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Вход</h3>
                <form method="post">
                    {% csrf_token %}
                    {% if form.errors %}
                        <div class="alert alert-danger">Неверный email или пароль.</div>
                    {% endif %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Электронная почта</label>
                        <input type="email" name="username" class="form-control" value="{{ form.username.value|default:'' }}" id="id_username" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" value="{{ form.password.value|default:'' }}" id="id_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                <p class="text-center mt-3">
                    Нет аккаунта? <a href="{% url 'accounts:register' %}">Зарегистрируйтесь</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
