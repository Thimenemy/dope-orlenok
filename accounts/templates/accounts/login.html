{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 p-4" style="border-radius: 16px; background: #fff;">
                <h3 class="text-center mb-4 fw-bold text-dark">Вход в систему</h3>
                
                <form method="post">
                    {% csrf_token %}
                    
                    {% if form.errors %}
                        <div class="alert alert-danger small py-2 rounded-3">Неверный email или пароль.</div>
                    {% endif %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label small fw-bold text-secondary">ЭЛЕКТРОННАЯ ПОЧТА</label>
                        <input type="email" name="username" class="form-control py-2" id="id_username" placeholder="example@mail.ru" required style="border-radius: 10px;">
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label small fw-bold text-secondary">ПАРОЛЬ</label>
                        <input type="password" name="password" class="form-control py-2" id="id_password" placeholder="••••••••" required style="border-radius: 10px;">
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-2.5 fw-bold rounded-pill shadow-sm mt-2">Войти</button>
                </form>
                
                <p class="text-center mt-4 small text-muted">
                    Нет аккаунта? <a href="{% url 'accounts:register' %}" class="fw-bold text-decoration-none">Зарегистрируйтесь</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
