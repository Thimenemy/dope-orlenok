{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card shadow border-0 p-4 text-center" style="border-radius: 16px; background: #fff;">
            <h3 class="fw-bold text-dark mb-2">Вход для детей</h3>
            <p class="text-muted small mb-4">Вбейте 11-значный код безопасности, запущенный в личном кабинете вашего родителя</p>
            
            {% if messages %}
                {% for msg in messages %}
                    <div class="alert alert-danger small py-2 rounded-3 mb-3">{{ msg }}</div>
                {% endfor %}
            {% endif %}

            <form method="post" autocomplete="off">
                {% csrf_token %}
                <div class="mb-4">
                    <input type="text" name="code" class="form-control form-control-lg text-center fw-bold text-uppercase" 
                           placeholder="XXXXXXXXXXX" maxlength="11" required style="font-size: 1.6rem; letter-spacing: 2px; border-radius: 12px;">
                </div>
                <button type="submit" class="btn btn-warning w-100 py-2.5 rounded-pill fw-bold text-dark shadow-sm">
                    <i class="fas fa-user-check me-1.5"></i> Проверить код доступа
                </button>
            </form>
            <div class="mt-3">
                <a href="{% url 'accounts:login' %}" class="text-secondary small">Вернуться к обычному входу</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
